<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 360px;
            position: relative;
        }

        h2 { text-align: center; margin-bottom: 25px; color: #333; }

        .form-container input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* Wrapper cho input password và icon mắt */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 40px; /* chừa chỗ cho icon */
        }

        .password-wrapper .toggle-password {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #888;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0056b3; }

        .register-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .register-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .register-link a:hover { text-decoration: underline; }

        @media (max-width: 400px) { .form-container { width: 90%; padding: 30px 20px; } }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Đăng Nhập</h2>
        <form action="login.php" method="POST">
            <input type="text" name="username" placeholder="Tên người dùng" required>

            <div class="password-wrapper">
                <input type="password" name="password" placeholder="Mật khẩu" id="password" required>
                <span class="toggle-password" onclick="togglePassword()">🔒</span>
            </div>

            <button type="submit">Đăng Nhập</button>
        </form>
        <div class="register-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = '🔓'; // đổi icon khi hiển thị mật khẩu
            } else {
                pwd.type = 'password';
                icon.textContent = '🔒';
            }
        }
    </script>
</body>
</html>
